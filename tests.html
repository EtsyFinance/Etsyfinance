<script>
// ─── MINIMAL TEST HARNESS ────────────────────────────────────────────────────
const suites = [];
let currentSuite = null;

function describe(name, fn) {
  currentSuite = { name, tests: [] };
  suites.push(currentSuite);
  fn();
  currentSuite = null;
}

function it(name, fn) {
  currentSuite.tests.push({ name, fn, status: 'pending', error: null, duration: 0 });
}

function expect(actual) {
  return {
    toBe(expected) {
      if (actual !== expected) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
    toEqual(expected) {
      if (JSON.stringify(actual) !== JSON.stringify(expected))
        throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
    toBeCloseTo(expected, decimals = 2) {
      const factor = Math.pow(10, decimals);
      if (Math.round(actual * factor) !== Math.round(expected * factor))
        throw new Error(`Expected ~${expected}, got ${actual}`);
    },
    toBeGreaterThan(n) {
      if (actual <= n) throw new Error(`Expected ${actual} > ${n}`);
    },
    toBeLessThan(n) {
      if (actual >= n) throw new Error(`Expected ${actual} < ${n}`);
    },
    toBeTruthy() {
      if (!actual) throw new Error(`Expected truthy, got ${JSON.stringify(actual)}`);
    },
    toBeFalsy() {
      if (actual) throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
    },
    toContain(item) {
      if (Array.isArray(actual)) {
        if (!actual.includes(item)) throw new Error(`Expected array to contain ${JSON.stringify(item)}`);
      } else if (typeof actual === 'string') {
        if (!actual.includes(item)) throw new Error(`Expected string "${actual}" to contain "${item}"`);
      } else {
        throw new Error(`toContain not supported for ${typeof actual}`);
      }
    },
    toHaveLength(n) {
      if (actual.length !== n) throw new Error(`Expected length ${n}, got ${actual.length}`);
    },
    toBeNull() {
      if (actual !== null) throw new Error(`Expected null, got ${JSON.stringify(actual)}`);
    },
    toMatch(regex) {
      if (!regex.test(actual)) throw new Error(`Expected "${actual}" to match ${regex}`);
    },
    not: {
      toBe(expected) {
        if (actual === expected) throw new Error(`Expected NOT ${JSON.stringify(expected)}`);
      },
      toBeTruthy() {
        if (actual) throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
      },
      toContain(item) {
        if (typeof actual === 'string' && actual.includes(item))
          throw new Error(`Expected string NOT to contain "${item}"`);
      }
    }
  };
}

// ─── CORE FUNCTIONS (copied from app, keeping in sync) ───────────────────────

function parseAmt(val) {
  if (!val) return 0;
  const neg = val.includes('(') && val.includes(')');
  const n = parseFloat(val.replace(/[^0-9.\-]/g, '')) || 0;
  return neg ? -Math.abs(n) : n;
}

function fmt(n, currency = '$') {
  const abs = Math.abs(n);
  const str = abs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (n < 0 ? '-' : '') + currency + str;
}

function normalizeRows(csvText) {
  const result = Papa.parse(csvText.trim(), {
    header: true, skipEmptyLines: true, transformHeader: h => h.trim()
  });
  return result.data.map(r => {
    const n = {};
    for (const k of Object.keys(r)) {
      const key = k.trim().toLowerCase()
        .replace(/\s+/g, '_').replace(/&/g, 'and').replace(/[^a-z0-9_]/g, '');
      n[key] = (r[k] || '').trim();
    }
    return n;
  });
}

function detectCOL(rows) {
  const cols = Object.keys(rows[0]);
  const find = names => cols.find(c => names.some(n => c.includes(n))) || null;
  return {
    date:     find(['date']),
    type:     find(['type']),
    title:    find(['title']),
    info:     find(['info']),
    currency: find(['currency']),
    amount:   find(['amount']),
    fees:     find(['fees_and_taxes','fees','fee']),
    net:      find(['net'])
  };
}

function aggregateRows(rows, COL) {
  const typed = rows.map(r => ({
    type:   (r[COL.type] || '').trim(),
    amount: parseAmt(r[COL.amount]),
    fees:   parseAmt(r[COL.fees]),
    net:    parseAmt(r[COL.net]),
    date:   r[COL.date] || '',
  }));

  const isSale    = t => t.type.toLowerCase() === 'sale';
  const isFeeType = t => ['transaction','listing','fee','marketing','subscription'].includes(t.type.toLowerCase());
  const isRefund  = t => t.type.toLowerCase() === 'refund';

  const sales    = typed.filter(isSale);
  const feeRows  = typed.filter(isFeeType);
  const refunds  = typed.filter(isRefund);

  const grossRevenue = sales.reduce((s, r) => s + r.amount, 0);
  const grossRefunds = Math.abs(refunds.reduce((s, r) => s + r.amount, 0));
  const totalFees    = Math.abs(feeRows.reduce((s, r) => s + r.fees + r.amount, 0));
  const paymentFees  = Math.abs(sales.reduce((s, r) => s + r.fees, 0));
  const netProfit    = grossRevenue - grossRefunds - totalFees;

  return { grossRevenue, grossRefunds, totalFees: totalFees + paymentFees, netProfit, sales, feeRows, refunds, typed };
}

// Pro license hash (same algorithm as app)
async function hashKey(key) {
  const SALT = 'etsyfinance_pro_2026';
  const encoder = new TextEncoder();
  const data = encoder.encode(key + SALT);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

const PRO_KEY_HASHES = new Set([

  "a6b7872c651869b6","35b686e54bbd7e96","a6e64acb19077e45","e05c2244ddb7f1da",
  "37330fb03c2fd7e3","ea669a13ef8aef4e","95c40cf9bc0a4931","d815c2e1ff6db230",
  "2031fc6f66cce99a","6b218dbf226ae7b2","a857e9c39d291fed","33230f5f7282d3ee",
  "58b3fc3ee4d576cd","7928a23c1ecc5d66","b59af2d950eae480","a8482e16173b9525"
]);

// ─── TEST SUITES ─────────────────────────────────────────────────────────────

describe('parseAmt — currency parsing', () => {
  it('parses a plain positive number', () => {
    expect(parseAmt('47.00')).toBe(47.00);
  });
  it('parses a plain negative number', () => {
    expect(parseAmt('-2.20')).toBe(-2.20);
  });
  it('returns 0 for empty/null', () => {
    expect(parseAmt('')).toBe(0);
    expect(parseAmt(null)).toBe(0);
    expect(parseAmt(undefined)).toBe(0);
  });
  it('handles parentheses as negative (accounting format)', () => {
    expect(parseAmt('(18.50)')).toBe(-18.50);
  });
  it('strips dollar signs', () => {
    expect(parseAmt('$47.00')).toBeCloseTo(47.00);
  });
  it('handles zero', () => {
    expect(parseAmt('0.00')).toBe(0);
  });
  it('handles large amounts with no decimals', () => {
    expect(parseAmt('1500')).toBe(1500);
  });
});

describe('fmt — number formatting', () => {
  it('formats positive numbers with dollar sign', () => {
    expect(fmt(1234.56)).toBe('$1,234.56');
  });
  it('formats negative numbers correctly', () => {
    expect(fmt(-42.50)).toBe('-$42.50');
  });
  it('formats zero', () => {
    expect(fmt(0)).toBe('$0.00');
  });
  it('adds thousands separator', () => {
    expect(fmt(10000)).toBe('$10,000.00');
  });
  it('uses custom currency symbol', () => {
    expect(fmt(100, '£')).toBe('£100.00');
  });
});

describe('CSV parsing — column detection', () => {
  it('detects all standard Etsy column names', () => {
    const rows = normalizeRows(DEMO_CSV);
    const COL = detectCOL(rows);
    expect(COL.date).toBeTruthy();
    expect(COL.type).toBeTruthy();
    expect(COL.amount).toBeTruthy();
    expect(COL.fees).toBeTruthy();
    expect(COL.net).toBeTruthy();
  });

  it('normalizes column headers with & to and', () => {
    const rows = normalizeRows(DEMO_CSV);
    const cols = Object.keys(rows[0]);
    expect(cols).toContain('fees_and_taxes');
  });

  it('parses all rows from demo CSV', () => {
    const rows = normalizeRows(DEMO_CSV);
    expect(rows.length).toBeGreaterThan(30);
  });

  it('handles extra whitespace in headers', () => {
    const csv = `  Date , Type , Amount , Fees & Taxes , Net \n03/01/2026,Sale,10.00,-0.50,9.50`;
    const rows = normalizeRows(csv);
    const COL = detectCOL(rows);
    expect(COL.amount).toBeTruthy();
    expect(COL.fees).toBeTruthy();
  });
});

describe('Revenue aggregation — KPI calculations', () => {
  const rows = normalizeRows(DEMO_CSV);
  const COL = detectCOL(rows);
  const agg = aggregateRows(rows, COL);

  it('gross revenue only counts Sale rows', () => {
    expect(agg.grossRevenue).toBeGreaterThan(0);
    // Sales in demo: 47+32.5+89+24+56+38+44+29.5+67+51+18+73+42 = 611
    expect(agg.grossRevenue).toBeCloseTo(611, 0);
  });

  it('refunds are subtracted correctly', () => {
    // One refund of -18.00
    expect(agg.grossRefunds).toBeCloseTo(18, 0);
  });

  it('net profit is gross minus refunds minus fees', () => {
    const expected = agg.grossRevenue - agg.grossRefunds;
    // netProfit should be less than grossRevenue
    expect(agg.netProfit).toBeLessThan(agg.grossRevenue);
  });

  it('deposits are not counted as revenue', () => {
    // Deposits should not appear in sales
    const depositInSales = agg.sales.find(r => r.type.toLowerCase() === 'deposit');
    expect(depositInSales).toBeFalsy();
  });

  it('subscription fees are counted in fee rows', () => {
    const subFee = agg.feeRows.find(r => r.type.toLowerCase() === 'subscription');
    expect(subFee).toBeTruthy();
  });

  it('marketing fees are counted in fee rows', () => {
    const mktFee = agg.feeRows.find(r => r.type.toLowerCase() === 'marketing');
    expect(mktFee).toBeTruthy();
  });
});

describe('Multi-file merging', () => {
  it('combining two CSVs produces more rows than either alone', () => {
    const rows1 = normalizeRows(DEMO_CSV);
    const rows2 = normalizeRows(MONTH2_CSV);
    const combined = [...rows1, ...rows2];
    expect(combined.length).toBeGreaterThan(rows1.length);
    expect(combined.length).toBeGreaterThan(rows2.length);
  });

  it('combined gross revenue equals sum of individual grosses', () => {
    const rows1 = normalizeRows(DEMO_CSV);
    const rows2 = normalizeRows(MONTH2_CSV);
    const COL1 = detectCOL(rows1);
    const COL2 = detectCOL(rows2);

    const agg1 = aggregateRows(rows1, COL1);
    const agg2 = aggregateRows(rows2, COL2);

    const combined = [...rows1, ...rows2];
    const aggC = aggregateRows(combined, COL1);

    expect(aggC.grossRevenue).toBeCloseTo(agg1.grossRevenue + agg2.grossRevenue, 1);
  });

  it('rows sort correctly by date after merge', () => {
    const rows1 = normalizeRows(DEMO_CSV);
    const rows2 = normalizeRows(MONTH2_CSV);
    const COL = detectCOL(rows1);
    const combined = [...rows1, ...rows2].sort((a, b) => {
      return new Date(a[COL.date]) - new Date(b[COL.date]);
    });
    // First row should be the oldest (January)
    expect(combined[0][COL.date]).toContain('01/');
  });

  it('duplicate file names are detected', () => {
    const staged = [{ name: 'march.csv', text: DEMO_CSV }];
    const isDuplicate = staged.find(f => f.name === 'march.csv');
    expect(isDuplicate).toBeTruthy();
  });
});

    // Key #1 from our launch set
    const key = 'EFP-1EF5-1095-4447';
    const hash = await hashKey(key);

  });

  it('an invalid key does not match any stored hash', async () => {

    expect(PRO_KEY_HASHES.has(hash)).toBe(false);
  });

  it('keys are case-insensitive after normalization', async () => {
    const lower = 'efp-1ef5-1095-4447';
    const hash = await hashKey(lower.toUpperCase());
    expect(PRO_KEY_HASHES.has(hash)).toBe(true);
  });

  it('all 20 launch keys are valid', async () => {
    const keys = [
      'EFP-1EF5-1095-4447','EFP-17B6-6349-A86C','EFP-2A85-C0FC-8595','EFP-39EB-F6B7-EC8B',
      'EFP-14B2-9721-967C','EFP-AE04-11DD-FE38','EFP-0FF4-F4F4-BD32','EFP-4C99-5FC4-48F7',
      'EFP-4B86-994F-646C','EFP-327E-374C-548C','EFP-DF46-FD1E-FCAB','EFP-BFE0-2041-8ECD',
      'EFP-B669-4B63-9D9E','EFP-CE81-1E88-4AF0','EFP-571B-F253-F439','EFP-47A2-4576-0DA1',
      'EFP-9800-1B5C-86A2','EFP-1367-4D99-898E','EFP-4097-D7C1-3D38','EFP-D441-679C-F78F'

    const results = await Promise.all(keys.map(k => hashKey(k).then(h => PRO_KEY_HASHES.has(h))));

  it('has exactly 20 keys in the hash set', () => {
    expect(PRO_KEY_HASHES.size).toBe(20);
  });
});

describe('formatKeyInput — key auto-formatting', () => {
  function simulateFormat(raw) {
    let v = raw.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
    let out = '';
    if (v.length > 0)  out += v.slice(0,3);
    if (v.length > 3)  out += '-' + v.slice(3,7);
    if (v.length > 7)  out += '-' + v.slice(7,11);
    if (v.length > 11) out += '-' + v.slice(11,15);
    return out;
  }

const TAX_BRACKETS = {
  2026: {
    single:  [[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[626350,0.35],[Infinity,0.37]],
    mfj:     [[23850,0.10],[96950,0.12],[206700,0.22],[394600,0.24],[501050,0.32],[751600,0.35],[Infinity,0.37]],
    mfs:     [[11925,0.10],[48475,0.12],[103350,0.22],[197300,0.24],[250525,0.32],[375800,0.35],[Infinity,0.37]],
    hoh:     [[17000,0.10],[64850,0.12],[103350,0.22],[197300,0.24],[250500,0.32],[626350,0.35],[Infinity,0.37]],
  },
  2025: {
    single:  [[11600,0.10],[47150,0.12],[100525,0.22],[191950,0.24],[243725,0.32],[609350,0.35],[Infinity,0.37]],
    mfj:     [[23200,0.10],[94300,0.12],[201050,0.22],[383900,0.24],[487450,0.32],[731200,0.35],[Infinity,0.37]],
    mfs:     [[11600,0.10],[47150,0.12],[100525,0.22],[191950,0.24],[243725,0.32],[365600,0.35],[Infinity,0.37]],
    hoh:     [[16550,0.10],[63100,0.12],[100500,0.22],[191950,0.24],[243700,0.32],[609350,0.35],[Infinity,0.37]],
  }
};

const STANDARD_DEDUCTION = {
  2026: { single: 15000, mfj: 30000, mfs: 15000, hoh: 22500 },
  2025: { single: 14600, mfj: 29200, mfs: 14600, hoh: 21900 },
};

const SE_TAX_RATE = 0.1530;
const SE_DEDUCTION_RATE = 0.50;
const QBI_DEDUCTION_RATE = 0.20;

function calculateFederalTax(taxableIncome, filingStatus, year) {
  const brackets = TAX_BRACKETS[year]?.[filingStatus] || TAX_BRACKETS[2026].single;
  let tax = 0, prev = 0;
  for (const [ceiling, rate] of brackets) {
    if (taxableIncome <= prev) break;
    const slice = Math.min(taxableIncome, ceiling) - prev;
    tax += slice * rate;
    prev = ceiling;
    if (ceiling === Infinity) break;
  }
  return Math.max(0, tax);
}

function getMarginalRate(taxableIncome, filingStatus, year) {
  const brackets = TAX_BRACKETS[year]?.[filingStatus] || TAX_BRACKETS[2026].single;
  let prev = 0;
  for (const [ceiling, rate] of brackets) {
    if (taxableIncome <= ceiling) return rate;
    prev = ceiling;
  }
  return 0.37;
}

function calcTax({ netProfit, otherIncome, extraExpenses, filingStatus, year }) {
  const adjustedProfit = Math.max(0, netProfit - extraExpenses);
  const netSEIncome    = adjustedProfit * 0.9235;
  const seTax          = netSEIncome * SE_TAX_RATE;
  const seDeduction    = seTax * SE_DEDUCTION_RATE;
  const stdDeduction   = STANDARD_DEDUCTION[year]?.[filingStatus] || 15000;
  const qbiDeduction   = adjustedProfit * QBI_DEDUCTION_RATE;
  const totalIncome    = adjustedProfit + otherIncome;
  const taxableIncome  = Math.max(0, totalIncome - seDeduction - stdDeduction - qbiDeduction);
  const federalTax     = calculateFederalTax(taxableIncome, filingStatus, year);
  const totalTax       = seTax + federalTax;
  const effectiveRate  = adjustedProfit > 0 ? totalTax / adjustedProfit : 0;
  const marginalRate   = getMarginalRate(taxableIncome, filingStatus, year);
  const quarterlyPayment = totalTax / 4;
  return { adjustedProfit, netSEIncome, seTax, seDeduction, stdDeduction, qbiDeduction,
           taxableIncome, federalTax, totalTax, effectiveRate, marginalRate, quarterlyPayment };
}

function buildLastRender(csvText) {
  const result = Papa.parse(csvText.trim(), {
    header: true, skipEmptyLines: true, transformHeader: h => h.trim()
  });
  const rows = result.data.map(r => {
    const n = {};
    for (const k of Object.keys(r)) {
      const key = k.trim().toLowerCase().replace(/\s+/g,'_').replace(/&/g,'and').replace(/[^a-z0-9_]/g,'');
      n[key] = (r[k]||'').trim();
    }
    return n;
  });
  const cols = Object.keys(rows[0]);
  const find = names => cols.find(c => names.some(n => c.includes(n))) || null;
  const COL = {
    date: find(['date']), type: find(['type']), title: find(['title']),
    info: find(['info']), currency: find(['currency']), amount: find(['amount']),
    fees: find(['fees_and_taxes','fees','fee']), net: find(['net'])
  };
  const typed = rows.map(r => ({
    type: (r[COL.type]||'').trim(), amount: parseAmt(r[COL.amount]),
    fees: parseAmt(r[COL.fees]), net: parseAmt(r[COL.net]),
    date: r[COL.date]||'', title: r[COL.title]||'', info: r[COL.info]||'',
  }));
  const isSale    = t => t.type.toLowerCase() === 'sale';
  const isFeeType = t => ['transaction','listing','fee','marketing','subscription'].includes(t.type.toLowerCase());
  const isRefund  = t => t.type.toLowerCase() === 'refund';
  const sales   = typed.filter(isSale);
  const feeRows = typed.filter(isFeeType);
  const refunds = typed.filter(isRefund);
  const grossRevenue = sales.reduce((s,r) => s+r.amount, 0);
  const grossRefunds = Math.abs(refunds.reduce((s,r) => s+r.amount, 0));
  const totalFees    = Math.abs(feeRows.reduce((s,r) => s+r.fees+r.amount, 0));
  const paymentFees  = Math.abs(sales.reduce((s,r) => s+r.fees, 0));
  const netProfit    = grossRevenue - grossRefunds - totalFees;
  const margin       = grossRevenue > 0 ? netProfit / grossRevenue : 0;
  const k1099Gross   = grossRevenue;
  const feeByType = {};
  for (const r of feeRows) {
    const key = r.type.charAt(0).toUpperCase() + r.type.slice(1).toLowerCase();
    feeByType[key] = (feeByType[key]||0) + Math.abs(r.fees+r.amount);
  }
  if (paymentFees > 0) feeByType['Payment Processing'] = (feeByType['Payment Processing']||0) + paymentFees;
  const dates = typed.map(r => r.date).filter(Boolean);
  const dateRange = dates.length ? `${dates[dates.length-1]} – ${dates[0]}` : 'demo';
  const monthly = {};
  for (const r of typed) {
    if (!r.date) continue;
    const parts = r.date.split('/');
    const key = parts.length >= 2 ? `${parts[0]}/${parts.length>=3?parts[2].slice(-2):''}` : r.date.slice(0,7);
    if (!monthly[key]) monthly[key] = { gross: 0, fees: 0 };
    if (isSale(r)) monthly[key].gross += r.amount;
    if (isFeeType(r)) monthly[key].fees += Math.abs(r.fees+r.amount);
    if (isSale(r)) monthly[key].fees += Math.abs(r.fees);
  }
  const monthKeys = Object.keys(monthly).sort();
  const currency = 'USD';
  const sym = '$';
  return {
    grossRevenue, grossRefunds, totalFees: totalFees + paymentFees, netProfit, margin,
    k1099Gross, feeByType, dateRange, sym, currency, monthly, monthKeys, typed,
    filename: 'test.csv', salesCount: sales.length, refundCount: refunds.length
  };
}

async function runAll() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Running…';

  const output = document.getElementById('test-output');
  output.innerHTML = '';

  let totalPass = 0, totalFail = 0, totalTests = 0;
  const allTests = suites.flatMap(s => s.tests);
  totalTests = allTests.length;
  let done = 0;

  for (const suite of suites) {
    const suiteEl = document.createElement('div');
    suiteEl.className = 'suite';
    suiteEl.innerHTML = `<div class="suite-title">${suite.name}</div>`;

    for (const test of suite.tests) {
      const row = document.createElement('div');
      row.className = 'test-row pending';

      const start = performance.now();
      try {
        const result = test.fn();
        if (result && typeof result.then === 'function') await result;
        test.status = 'pass';
        totalPass++;
      } catch(e) {
        test.status = 'fail';
        test.error = e.message;
        totalFail++;
      }
      test.duration = (performance.now() - start).toFixed(1);
      done++;

      const icon = test.status === 'pass' ? '✓' : '✗';
      row.className = `test-row ${test.status}`;
      row.innerHTML = `
        <div class="test-icon">${icon}</div>
        <div class="test-name">
          ${test.name}
          ${test.error ? `<div class="test-detail">${test.error}</div>` : ''}
        </div>
        <div class="test-time">${test.duration}ms</div>
      `;
      suiteEl.appendChild(row);

      // Update progress
      document.getElementById('progress').style.width = `${(done/totalTests)*100}%`;
    }

    output.appendChild(suiteEl);
  }

  // Summary
  document.getElementById('s-total').textContent = totalTests;
  document.getElementById('s-pass').textContent = totalPass;
  document.getElementById('s-fail').textContent = totalFail;
  document.getElementById('s-skip').textContent = 0;

  btn.disabled = false;
  btn.textContent = totalFail === 0 ? '✓ All passed — Run Again' : `✗ ${totalFail} failed — Run Again`;
  btn.style.background = totalFail === 0 ? 'var(--pass)' : 'var(--fail)';
}

// Auto-run on load
window.addEventListener('load', () => setTimeout(runAll, 200));
</script>
</body>
</html>
